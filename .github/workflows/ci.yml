name: CI

on:
  # CI is intentionally paused while Track A focuses on local runtime work.
  # It remains manually runnable from the Actions tab when needed.
  workflow_dispatch:

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.1
          components: clippy,rustfmt
      - run: cargo fmt --all --check
      - run: cargo check -p magnolia_core --no-default-features
      - run: cargo clippy --all-targets
      - run: cargo test
